<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curve Calculator — SurveyCalc</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
.top-bar{display:flex;align-items:center;gap:12px;background:#16213e;border-bottom:1px solid #0f3460;padding:10px 16px}
.back-btn{display:flex;align-items:center;gap:6px;color:#4fc3f7;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;padding:4px 8px;border-radius:6px;border:1px solid #1e3a5f;background:transparent;transition:all .2s}
.back-btn:hover{border-color:#4fc3f7;background:rgba(79,195,247,.08)}
.top-bar-title{font-size:15px;font-weight:600;color:#e0e0e0}
.page{padding:16px;max-width:480px;margin:0 auto}
.section-title{font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#4fc3f7;margin:0 0 10px}
.card{background:#16213e;border:1px solid #0f3460;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.tog-btn{padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #1e3a5f;background:#0f1b35;color:#888;transition:all .2s}
.tog-btn:first-child{border-radius:6px 0 0 6px}
.tog-btn:last-child{border-radius:0 6px 6px 0}
.tog-btn.active{background:#4fc3f7;border-color:#4fc3f7;color:#0a0a1a}
.prec-sel{padding:6px 8px;background:#0f1b35;border:1px solid #1e3a5f;border-radius:6px;color:#e0e0e0;font-size:12px;outline:none}
.set-lbl{font-size:11px;color:#666;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.inp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.inp-field{display:flex;flex-direction:column;gap:3px}
.inp-label{font-size:12px;color:#888;display:flex;align-items:center;justify-content:space-between}
.inp-sym{font-size:11px;color:#4fc3f7;font-style:italic;font-weight:600}
.inp-input{padding:9px 10px;background:#0f1b35;border:1px solid #1e3a5f;border-radius:8px;color:#e0e0e0;font-size:15px;outline:none;width:100%}
.inp-input:focus{border-color:#4fc3f7}
.inp-input.field-known{border-color:#4fc3f7}
.inp-input.field-error{border-color:#ff5252}
.inp-err{font-size:12px;color:#ff5252;min-height:16px;margin-top:2px}
.btn-pri{flex:1;padding:10px;background:#4fc3f7;border:2px solid;border-color:#81d4fa #0a1a30 #0a1a30 #81d4fa;border-radius:8px;color:#0a0a1a;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-pri:active{transform:translateY(1px)}
.btn-sec{flex:1;padding:10px;background:#0f1b35;border:2px solid;border-color:#2a4a70 #0a1a30 #0a1a30 #2a4a70;border-radius:8px;color:#aaa;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-sec:active{transform:translateY(1px)}
.res-row{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:all .15s;margin-bottom:4px}
.res-row:hover{background:#0f2440;border-color:#1e3a5f}
.res-row:hover .res-val{color:#4fc3f7}
.res-label{font-size:13px;color:#888}
.res-val{font-size:14px;font-weight:600;color:#e0e0e0;font-family:'Courier New',monospace}
.known-tag{font-size:10px;background:#0f3460;color:#4fc3f7;border-radius:4px;padding:2px 5px;margin-left:6px}
.divider{border:none;border-top:1px solid #0f3460;margin:8px 0}
.btn-copy-sm{padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #1e3a5f;background:transparent;color:#888;transition:all .2s}
.btn-copy-sm:hover{border-color:#4fc3f7;color:#4fc3f7}
.btn-copy-sm.copied{border-color:#66bb6a;color:#66bb6a}
</style>
</head>
<body>

<div class="top-bar">
  <a href="index.html" class="back-btn">&#8592; Home</a>
  <div class="top-bar-title">Curve Calculator</div>
</div>

<div class="page">
  <div style="margin-top:16px">
    <div style="font-size:12px;color:#666;margin-bottom:14px">Solve all curve parameters from any 2&#8202;&#8211;&#8202;3 known values</div>

    <!-- Settings -->
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;flex-direction:column;gap:10px">
        <div style="display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start">
          <div>
            <div class="set-lbl">Units</div>
            <div style="display:flex"><button class="tog-btn active" id="tog_metric">Metric</button><button class="tog-btn" id="tog_imperial">Imperial</button></div>
          </div>
          <div>
            <div class="set-lbl">Angle Input</div>
            <div style="display:flex"><button class="tog-btn active" id="tog_dms">DMS</button><button class="tog-btn" id="tog_dd">DD</button></div>
          </div>
        </div>
        <div style="display:flex;gap:14px;align-items:flex-start">
          <div>
            <div class="set-lbl">Value precision</div>
            <select id="prec_val" class="prec-sel"><option value="0">0 dp</option><option value="1">1 dp</option><option value="2">2 dp</option><option value="3" selected>3 dp</option><option value="4">4 dp</option><option value="5">5 dp</option><option value="6">6 dp</option><option value="7">7 dp</option><option value="8">8 dp</option></select>
          </div>
          <div>
            <div class="set-lbl">Angle precision</div>
            <select id="prec_ang" class="prec-sel"><option value="0">0 dp</option><option value="1">1 dp</option><option value="2">2 dp</option><option value="3" selected>3 dp</option><option value="4">4 dp</option><option value="5">5 dp</option><option value="6">6 dp</option><option value="7">7 dp</option><option value="8">8 dp</option></select>
          </div>
        </div>
      </div>
    </div>

    <!-- Inputs -->
    <div class="card" style="margin-bottom:12px">
      <div class="section-title">Curve Parameters</div>
      <div style="font-size:12px;color:#666;margin-bottom:12px">Enter any 2 or 3 known values</div>
      <div class="inp-grid">
        <div class="inp-field">
          <div class="inp-label">Radius <span class="inp-sym">R</span></div>
          <input class="inp-input" id="inp_R" type="text" inputmode="decimal" placeholder="0.000">
        </div>
        <div class="inp-field">
          <div class="inp-label">Delta Angle <span class="inp-sym">&Delta;</span></div>
          <input class="inp-input" id="inp_D" type="text" inputmode="decimal" placeholder="0.0000" data-angle="1">
        </div>
        <div class="inp-field">
          <div class="inp-label">Delta/2 <span class="inp-sym">&Delta;/2</span></div>
          <input class="inp-input" id="inp_HD" type="text" inputmode="decimal" placeholder="0.0000" data-angle="1">
        </div>
        <div class="inp-field">
          <div class="inp-label">Arc Length <span class="inp-sym">L</span></div>
          <input class="inp-input" id="inp_L" type="text" inputmode="decimal" placeholder="0.000">
        </div>
        <div class="inp-field">
          <div class="inp-label">Chord <span class="inp-sym">C</span></div>
          <input class="inp-input" id="inp_C" type="text" inputmode="decimal" placeholder="0.000">
        </div>
        <div class="inp-field">
          <div class="inp-label">Sub Tangent <span class="inp-sym">T</span></div>
          <input class="inp-input" id="inp_T" type="text" inputmode="decimal" placeholder="0.000">
        </div>
        <div class="inp-field">
          <div class="inp-label">External <span class="inp-sym">E</span></div>
          <input class="inp-input" id="inp_E" type="text" inputmode="decimal" placeholder="0.000">
        </div>
        <div class="inp-field">
          <div class="inp-label">Midordinate <span class="inp-sym">M</span></div>
          <input class="inp-input" id="inp_M" type="text" inputmode="decimal" placeholder="0.000">
        </div>
      </div>
      <div class="inp-err" id="err_global"></div>
      <div style="display:flex;gap:10px;margin-top:12px">
        <button class="btn-sec" id="reset_btn">Reset</button>
        <button class="btn-pri" id="calc_btn">Calculate</button>
      </div>
    </div>

    <!-- Results -->
    <div id="results_section" style="display:none">
      <div class="card">
        <div class="section-title" style="margin-bottom:10px">Results</div>
        <div id="res_rows"></div>
        <hr class="divider">
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px">
          <button class="btn-copy-sm" id="copy_btn">Copy Results</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
var curveUnit='metric', curveAngleFmt='dms', curveLastResult=null, curveKnownKeys=[];

function pad2(n){return n<10?'0'+n:''+n}

function copyToClipboard(text,btn){
  function fb(){var t=document.createElement('textarea');t.value=text;t.style.position='fixed';t.style.opacity='0';document.body.appendChild(t);t.focus();t.select();try{document.execCommand('copy')}catch(e){}document.body.removeChild(t)}
  function flash(){if(!btn)return;var o=btn.textContent;btn.textContent='Copied!';btn.classList.add('copied');setTimeout(function(){btn.textContent=o;btn.classList.remove('copied')},1500)}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(flash,function(){fb();flash()})}else{fb();flash()}
}

function getPrec(){return parseInt(document.getElementById('prec_val').value,10)}
function getAngPrec(){return parseInt(document.getElementById('prec_ang').value,10)}

function fmtVal(v){return v.toFixed(getPrec())}

function _dms(dd,sep){
  var p=getAngPrec(),neg=dd<0;
  dd=Math.abs(dd);
  var d=Math.floor(dd),mt=(dd-d)*60,m=Math.floor(mt),s=(mt-m)*60;
  var f=Math.pow(10,p);s=Math.round(s*f)/f;
  if(s>=60){s=0;m++}if(m>=60){m=0;d++}
  var sq=sep?'"':'\u2033',mq=sep?"'":'\u2032';
  return(neg?'-':'')+d+'\u00b0 '+pad2(m)+mq+' '+s.toFixed(p)+sq;
}
function fmtDMS(dd){return _dms(dd,false)}
function fmtDMSCopy(dd){return _dms(dd,true)}

/* ---- Angle parser ---- */
function parseAngle(val){
  val=val.trim();if(!val)return null;
  if(curveAngleFmt==='dd'){var n=parseFloat(val);return isNaN(n)?null:n}
  /* Strip symbols then split */
  var s=val.replace(/[°d\u00b0]/g,' ').replace(/['\u2032m]/g,' ').replace(/["\u2033s]/g,' ').trim();
  var pts=s.split(/\s+/);
  if(pts.length===1){
    /* Compact DMS: DD.MMSS */
    var n=parseFloat(pts[0]);if(isNaN(n))return null;
    var neg=n<0;n=Math.abs(n);
    var d=Math.floor(n),frac=Math.round((n-d)*10000);
    var m=Math.floor(frac/100),sc=frac%100;
    if(m>59||sc>59)return null;
    var dd=d+m/60+sc/3600;return neg?-dd:dd;
  }
  var d=parseFloat(pts[0])||0,m=parseFloat(pts[1])||0,sc=parseFloat(pts[2])||0;
  if(m<0||m>=60||sc<0||sc>=60)return null;
  var neg=d<0;d=Math.abs(d);
  return (neg?-1:1)*(d+m/60+sc/3600);
}

/* ---- g-functions: param = R * g(Delta_degrees) ---- */
var gF={
  L:function(d){return d*Math.PI/180},
  C:function(d){return 2*Math.sin(d/2*Math.PI/180)},
  T:function(d){return Math.tan(d/2*Math.PI/180)},
  E:function(d){return 1/Math.cos(d/2*Math.PI/180)-1},
  M:function(d){return 1-Math.cos(d/2*Math.PI/180)}
};

/* Bisect monotone increasing g(D)=target, D in (lo,hi) */
function bisectMono(g,target,lo,hi){
  if(g(lo)>target||g(hi)<target)return null;
  for(var i=0;i<120;i++){var m=(lo+hi)/2;if(g(m)<target)lo=m;else hi=m;if(hi-lo<1e-13)break}
  return(lo+hi)/2;
}

/* Bisect for ratio g1(D)/g2(D)=ratio — scan for sign change first */
function bisectRatio(ratio,g1,g2){
  var f=function(D){var v2=g2(D);return Math.abs(v2)<1e-15?Infinity:g1(D)/v2-ratio};
  var lo=1e-6,hi=180-1e-6,N=600,step=(hi-lo)/N;
  var pD=lo,pF=f(lo);
  for(var i=1;i<=N;i++){
    var D=lo+i*step,fD=f(D);
    if(isFinite(pF)&&isFinite(fD)&&pF*fD<0){
      var a=pD,b=D;
      for(var j=0;j<120;j++){var m=(a+b)/2;if(f(a)*f(m)<0)b=m;else a=m;if(b-a<1e-13)break}
      return(a+b)/2;
    }
    pD=D;pF=fD;
  }
  return null;
}

var PNAME={R:'Radius',D:'Delta angle',HD:'Delta/2',L:'Arc length',C:'Chord',T:'Sub tangent',E:'External',M:'Midordinate'};

function solveCurve(inp){
  /* Validate positivity */
  ['R','L','C','T','E','M'].forEach(function(k){if(inp[k]!==null&&inp[k]<=0)throw PNAME[k]+' must be positive'});
  if(inp.D!==null&&inp.D<=0)throw 'Delta angle must be positive';
  if(inp.HD!==null&&inp.HD<=0)throw 'Delta/2 must be positive';

  var R=inp.R, D=inp.D;

  /* Incorporate HD */
  if(inp.HD!==null){
    var Dfh=inp.HD*2;
    if(D!==null&&Math.abs(D-Dfh)>1e-4)throw 'Delta angle and Delta/2 are inconsistent';
    D=Dfh;
  }
  if(D!==null&&(D<=0||D>=180))throw 'Delta angle must be between 0° and 180°';

  var dk=['L','C','T','E','M'].filter(function(k){return inp[k]!==null});

  if(R!==null&&D!==null){
    /* Both known */
  }else if(R!==null&&D===null){
    if(dk.length===0)throw 'Need at least one more value to solve';
    var target=inp[dk[0]]/R;
    D=bisectMono(gF[dk[0]],target,1e-9,180-1e-9);
    if(D===null)throw 'Could not solve for Delta — check input values';
  }else if(D!==null&&R===null){
    if(dk.length===0)throw 'Need at least one distance value to solve';
    R=inp[dk[0]]/gF[dk[0]](D);
    if(!isFinite(R)||R<=0)throw 'Invalid result — check input values';
  }else{
    /* No R, no D — need 2 distance params */
    if(dk.length<2)throw 'Please enter at least 2 known values';
    var p1=dk[0],p2=dk[1],v1=inp[p1],v2=inp[p2];
    var pair=p1+p2;

    /* C + T: direct formula (from spec §3.5) */
    if(pair==='CT'||pair==='TC'){
      var cv=inp.C,tv=inp.T,cosHD=cv/(2*tv);
      if(cosHD<=-1||cosHD>=1)throw 'Chord and Sub Tangent values are inconsistent';
      D=2*Math.acos(cosHD)*180/Math.PI;
      R=(cv/2)/Math.sin(D/2*Math.PI/180);
    }
    /* E + M: direct formula (E/M = sec(D/2), so cos(D/2)=M/E) */
    else if(pair==='EM'||pair==='ME'){
      var ev=inp.E,mv=inp.M,cosHD=mv/ev;
      if(cosHD<=0||cosHD>=1)throw 'External and Midordinate values are inconsistent';
      D=2*Math.acos(cosHD)*180/Math.PI;
      R=mv/(1-Math.cos(D/2*Math.PI/180));
    }
    /* General: ratio bisection */
    else{
      D=bisectRatio(v1/v2,gF[p1],gF[p2]);
      if(D===null)throw 'Solver did not converge — try adding a third known value';
      R=v1/gF[p1](D);
    }
  }

  if(!isFinite(D)||D<=0||D>=180)throw 'Delta angle must be between 0° and 180°';
  if(!isFinite(R)||R<=0)throw 'Radius must be positive';

  /* Compute all parameters */
  var Dr=D*Math.PI/180;
  var L=R*Dr;
  var C=2*R*Math.sin(Dr/2);
  var T=R*Math.tan(Dr/2);
  var E=R*(1/Math.cos(Dr/2)-1);
  var M=R*(1-Math.cos(Dr/2));
  var HD=D/2;
  var Da=(100/R)*(180/Math.PI);
  var Dc=R>=50?2*Math.asin(50/R)*180/Math.PI:null;

  /* Final validation */
  if(C>2*R+1e-4)throw 'Chord cannot be greater than diameter (2R)';
  if(M>R+1e-4)throw 'Midordinate cannot be greater than radius';
  if(L>Math.PI*R+1e-4)throw 'Arc length cannot exceed a semi-circle (\u03c0 \u00d7 R)';
  if(C>L+1e-4)throw 'Chord cannot be greater than arc length';

  return{R:R,D:D,HD:HD,L:L,C:C,T:T,E:E,M:M,Da:Da,Dc:Dc};
}

function getInputs(){
  var map={R:'inp_R',D:'inp_D',HD:'inp_HD',L:'inp_L',C:'inp_C',T:'inp_T',E:'inp_E',M:'inp_M'};
  var inp={},kk=[],count=0;
  Object.keys(map).forEach(function(k){
    var raw=document.getElementById(map[k]).value.trim();
    if(!raw){inp[k]=null;return}
    var n=(k==='D'||k==='HD')?parseAngle(raw):parseFloat(raw);
    if(n===null||isNaN(n)){inp[k]=null}else{inp[k]=n;kk.push(k);count++}
  });
  return{inp:inp,known:kk,count:count};
}

function clearStates(){
  ['inp_R','inp_D','inp_HD','inp_L','inp_C','inp_T','inp_E','inp_M'].forEach(function(id){
    document.getElementById(id).classList.remove('field-known','field-error');
  });
  document.getElementById('err_global').textContent='';
}

function calculate(){
  clearStates();
  document.getElementById('results_section').style.display='none';
  curveLastResult=null;curveKnownKeys=[];

  var data=getInputs();
  if(data.count<2){document.getElementById('err_global').textContent='Please enter at least 2 known values';return}
  if(data.count>3){document.getElementById('err_global').textContent='Please enter no more than 3 known values';return}

  var map={R:'inp_R',D:'inp_D',HD:'inp_HD',L:'inp_L',C:'inp_C',T:'inp_T',E:'inp_E',M:'inp_M'};
  data.known.forEach(function(k){document.getElementById(map[k]).classList.add('field-known')});

  try{
    var r=solveCurve(data.inp);
    curveLastResult=r;curveKnownKeys=data.known;
    renderResults(r);
  }catch(e){
    document.getElementById('err_global').textContent=typeof e==='string'?e:'Calculation error — check inputs';
  }
}

function renderResults(r){
  var u=curveUnit==='metric'?'m':'ft';
  var p=getPrec();
  var rows=[
    {label:'Delta Angle (\u0394)',       val:fmtDMS(r.D),                          copy:r.D.toFixed(10),  key:'D'},
    {label:'Arc Length',                 val:fmtVal(r.L)+'\u2006'+u,               copy:r.L.toFixed(p),   key:'L'},
    {label:'Radius',                     val:fmtVal(r.R)+'\u2006'+u,               copy:r.R.toFixed(p),   key:'R'},
    {label:'Sub Tangent',                val:fmtVal(r.T)+'\u2006'+u,               copy:r.T.toFixed(p),   key:'T'},
    {label:'Chord',                      val:fmtVal(r.C)+'\u2006'+u,               copy:r.C.toFixed(p),   key:'C'},
    {label:'External',                   val:fmtVal(r.E)+'\u2006'+u,               copy:r.E.toFixed(p),   key:'E'},
    {label:'Midordinate',                val:fmtVal(r.M)+'\u2006'+u,               copy:r.M.toFixed(p),   key:'M'},
    {label:'Delta/2 (\u0394/2)',         val:fmtDMS(r.HD),                         copy:r.HD.toFixed(10), key:'HD'},
    {label:'Degree of Curve (Arc)',      val:fmtDMS(r.Da),                         copy:r.Da.toFixed(10), key:null},
    {label:'Degree of Curve (Chord)',    val:r.Dc!==null?fmtDMS(r.Dc):'N/A (R\u226450)', copy:r.Dc!==null?r.Dc.toFixed(10):'', key:null},
  ];
  window._cc=rows.map(function(row){return row.copy});
  var el=document.getElementById('res_rows');
  el.innerHTML=rows.map(function(row,i){
    var tag=row.key&&curveKnownKeys.indexOf(row.key)>=0?'<span class="known-tag">Known</span>':'';
    return '<div class="res-row" data-i="'+i+'"><span class="res-label">'+row.label+tag+'</span><span class="res-val">'+row.val+'</span></div>';
  }).join('');
  el.onclick=function(e){var rw=e.target.closest('.res-row');if(!rw)return;var v=window._cc[+rw.dataset.i];if(v)copyToClipboard(v,null)};
  document.getElementById('results_section').style.display='block';
}

function copyAllResults(){
  if(!curveLastResult)return;
  var r=curveLastResult,u=curveUnit==='metric'?'m':'ft',p=getPrec();
  var lines=[
    'Curve Calculator Results','',
    'Delta Angle (\u0394): '+fmtDMSCopy(r.D),
    'Arc Length: '+r.L.toFixed(p)+' '+u,
    'Radius: '+r.R.toFixed(p)+' '+u,
    'Sub Tangent: '+r.T.toFixed(p)+' '+u,
    'Chord: '+r.C.toFixed(p)+' '+u,
    'External: '+r.E.toFixed(p)+' '+u,
    'Midordinate: '+r.M.toFixed(p)+' '+u,
    'Delta/2 (\u0394/2): '+fmtDMSCopy(r.HD),
    'Degree of Curve (Arc): '+fmtDMSCopy(r.Da),
    'Degree of Curve (Chord): '+(r.Dc!==null?fmtDMSCopy(r.Dc):'N/A'),
  ];
  copyToClipboard(lines.join('\r\n'),document.getElementById('copy_btn'));
}

function setUnit(u){
  curveUnit=u;
  document.getElementById('tog_metric').classList.toggle('active',u==='metric');
  document.getElementById('tog_imperial').classList.toggle('active',u==='imperial');
  if(curveLastResult)renderResults(curveLastResult);
}
function setAngleFmt(f){
  curveAngleFmt=f;
  document.getElementById('tog_dms').classList.toggle('active',f==='dms');
  document.getElementById('tog_dd').classList.toggle('active',f==='dd');
  var ph=f==='dms'?'0.0000':'0.000000';
  ['inp_D','inp_HD'].forEach(function(id){document.getElementById(id).placeholder=ph});
}
function resetCalc(){
  ['inp_R','inp_D','inp_HD','inp_L','inp_C','inp_T','inp_E','inp_M'].forEach(function(id){
    var el=document.getElementById(id);el.value='';el.classList.remove('field-known','field-error');
  });
  document.getElementById('err_global').textContent='';
  document.getElementById('results_section').style.display='none';
  curveLastResult=null;curveKnownKeys=[];
}

document.getElementById('calc_btn').addEventListener('click',calculate);
document.getElementById('reset_btn').addEventListener('click',resetCalc);
document.getElementById('tog_metric').addEventListener('click',function(){setUnit('metric')});
document.getElementById('tog_imperial').addEventListener('click',function(){setUnit('imperial')});
document.getElementById('tog_dms').addEventListener('click',function(){setAngleFmt('dms')});
document.getElementById('tog_dd').addEventListener('click',function(){setAngleFmt('dd')});
document.getElementById('prec_val').addEventListener('change',function(){if(curveLastResult)renderResults(curveLastResult)});
document.getElementById('prec_ang').addEventListener('change',function(){if(curveLastResult)renderResults(curveLastResult)});
document.getElementById('copy_btn').addEventListener('click',copyAllResults);
</script>
</body>
