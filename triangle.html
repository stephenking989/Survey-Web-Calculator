<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triangle Solver — SurveyCalc</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
.top-bar{display:flex;align-items:center;gap:12px;background:#16213e;border-bottom:1px solid #0f3460;padding:10px 16px}
.back-btn{display:flex;align-items:center;gap:6px;color:#4fc3f7;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;padding:4px 8px;border-radius:6px;border:1px solid #1e3a5f;background:transparent;transition:all .2s}
.back-btn:hover{border-color:#4fc3f7;background:rgba(79,195,247,.08)}
.top-bar-title{font-size:15px;font-weight:600;color:#e0e0e0}
.page{padding:16px;max-width:480px;margin:0 auto}
.section-title{font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#4fc3f7;margin:0 0 10px}
.card{background:#16213e;border:1px solid #0f3460;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.tog-btn{padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #1e3a5f;background:#0f1b35;color:#888;transition:all .2s}
.tog-btn:first-child{border-radius:6px 0 0 6px}
.tog-btn:last-child{border-radius:0 6px 6px 0}
.tog-btn.active{background:#4fc3f7;border-color:#4fc3f7;color:#0a0a1a}
.prec-sel{padding:6px 8px;background:#0f1b35;border:1px solid #1e3a5f;border-radius:6px;color:#e0e0e0;font-size:12px;outline:none}
.tri-field{display:flex;flex-direction:column;gap:3px}
.tri-label{font-size:12px;color:#888}
.tri-input{padding:9px 10px;background:#0f1b35;border:1px solid #1e3a5f;border-radius:8px;color:#e0e0e0;font-size:15px;outline:none;width:100%}
.tri-input:focus{border-color:#4fc3f7}
.tri-input.field-known{border-color:#4fc3f7}
.tri-input.field-error{border-color:#ff5252}
.tri-err{font-size:11px;color:#ff5252;min-height:14px}
.tri-btn-pri{flex:1;padding:10px;background:#4fc3f7;border:2px solid;border-color:#81d4fa #0a1a30 #0a1a30 #81d4fa;border-radius:8px;color:#0a0a1a;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.tri-btn-pri:active{transform:translateY(1px)}
.tri-btn-sec{flex:1;padding:10px;background:#0f1b35;border:2px solid;border-color:#2a4a70 #0a1a30 #0a1a30 #2a4a70;border-radius:8px;color:#aaa;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s}
.tri-btn-sec:active{transform:translateY(1px)}
.res-row{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:all .15s;margin-bottom:4px}
.res-row:hover{background:#0f2440;border-color:#1e3a5f}
.res-row:hover .res-row-val{color:#4fc3f7}
.res-row-label{font-size:13px;color:#888}
.res-row-val{font-size:14px;font-weight:600;color:#e0e0e0;font-family:'Courier New',monospace}
.known-tag{font-size:10px;background:#0f3460;color:#4fc3f7;border-radius:4px;padding:2px 5px;margin-left:6px}
.calc-tag{font-size:10px;background:#1a3020;color:#66bb6a;border-radius:4px;padding:2px 5px;margin-left:6px}
.btn-copy-sm{padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #1e3a5f;background:transparent;color:#888;transition:all .2s}
.btn-copy-sm:hover{border-color:#4fc3f7;color:#4fc3f7}
.btn-copy-sm.copied{border-color:#66bb6a;color:#66bb6a}
.dms-btn{padding:8px 10px;font-size:13px;border:1px solid #1e3a5f;border-radius:6px;background:#0f1b35;color:#888;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.dms-btn:hover{border-color:#4fc3f7;color:#4fc3f7}
.dms-btn-done{border-color:#66bb6a !important;color:#66bb6a !important}
</style>
</head>
<body>

<div class="top-bar">
  <a href="index.html" class="back-btn">&#8592; Home</a>
  <div class="top-bar-title">Triangle Solver</div>
</div>

<div class="page">
  <div style="margin-top:16px">
    <div style="font-size:12px;color:#666;margin-bottom:14px">Enter any 3 known values to solve the triangle</div>

    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;flex-direction:column;gap:10px">
        <div style="display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start">
          <div>
            <div style="font-size:11px;color:#666;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">Units</div>
            <div style="display:flex"><button class="tog-btn active" id="tog_metric">Metric</button><button class="tog-btn" id="tog_imperial">Imperial</button></div>
          </div>
          <div>
            <div style="font-size:11px;color:#666;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">Angle Input</div>
            <div style="display:flex"><button class="tog-btn active" id="tog_dms">DMS</button><button class="tog-btn" id="tog_dd">DD</button></div>
          </div>
        </div>
        <div style="display:flex;gap:14px;align-items:flex-start">
          <div>
            <div style="font-size:11px;color:#666;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">Side precision</div>
            <select id="prec_side" class="prec-sel"><option value="0">0 dp</option><option value="1">1 dp</option><option value="2">2 dp</option><option value="3" selected>3 dp</option><option value="4">4 dp</option><option value="5">5 dp</option><option value="6">6 dp</option><option value="7">7 dp</option><option value="8">8 dp</option></select>
          </div>
          <div>
            <div style="font-size:11px;color:#666;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em">Angle precision</div>
            <select id="prec_ang" class="prec-sel"><option value="0" selected>0 dp</option><option value="1">1 dp</option><option value="2">2 dp</option><option value="3">3 dp</option><option value="4">4 dp</option><option value="5">5 dp</option><option value="6">6 dp</option><option value="7">7 dp</option><option value="8">8 dp</option></select>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="tri-field"><label class="tri-label" for="t_sideA">Side a <span class="unit-lbl">(m)</span></label><input class="tri-input" id="t_sideA" type="text" inputmode="decimal" placeholder="0"><div class="tri-err" id="err_sideA"></div></div>
        <div class="tri-field"><label class="tri-label" for="t_angA">Angle A</label><div style="display:flex;gap:4px"><input class="tri-input" id="t_angA" type="text" inputmode="decimal" placeholder="0.0000" style="width:auto;flex:1;min-width:0"><button class="dms-btn" id="dms_btn_angA">&#x00b0;&#x2032;&#x2033;</button></div><div class="tri-err" id="err_angA"></div></div>
        <div class="tri-field"><label class="tri-label" for="t_sideB">Side b <span class="unit-lbl">(m)</span></label><input class="tri-input" id="t_sideB" type="text" inputmode="decimal" placeholder="0"><div class="tri-err" id="err_sideB"></div></div>
        <div class="tri-field"><label class="tri-label" for="t_angB">Angle B</label><div style="display:flex;gap:4px"><input class="tri-input" id="t_angB" type="text" inputmode="decimal" placeholder="0.0000" style="width:auto;flex:1;min-width:0"><button class="dms-btn" id="dms_btn_angB">&#x00b0;&#x2032;&#x2033;</button></div><div class="tri-err" id="err_angB"></div></div>
        <div class="tri-field"><label class="tri-label" for="t_sideC">Side c <span class="unit-lbl">(m)</span></label><input class="tri-input" id="t_sideC" type="text" inputmode="decimal" placeholder="0"><div class="tri-err" id="err_sideC"></div></div>
        <div class="tri-field"><label class="tri-label" for="t_angC">Angle C</label><div style="display:flex;gap:4px"><input class="tri-input" id="t_angC" type="text" inputmode="decimal" placeholder="0.0000" style="width:auto;flex:1;min-width:0"><button class="dms-btn" id="dms_btn_angC">&#x00b0;&#x2032;&#x2033;</button></div><div class="tri-err" id="err_angC"></div></div>
      </div>
      <div class="tri-err" id="err_global" style="margin-top:8px;font-size:13px"></div>
      <div style="display:flex;gap:10px;margin-top:12px">
        <button class="tri-btn-sec" id="tri_reset_btn">Reset</button>
        <button class="tri-btn-pri" id="tri_calc_btn">Calculate</button>
      </div>
    </div>

    <div id="tri_diagram" style="display:none" class="card">
      <svg id="tri_svg" width="100%" height="220" style="display:block;overflow:visible" aria-label="Triangle diagram"></svg>
    </div>

    <div id="tri_results" style="display:none" class="card">
      <div class="section-title" style="margin-bottom:10px">Results</div>
      <div id="res_rows"></div>
      <div id="res_method" style="font-size:11px;color:#555;margin-top:10px"></div>
      <div style="display:flex;gap:10px;margin-top:12px">
        <button class="tri-btn-sec" id="copy_all_btn">Copy All</button>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
var SC=window.SurveyCalc||{};
var triUnit='metric',triAngleFmt='dms',triLastResult=null;

function pad2(n){return n<10?'0'+n:''+n}

function copyToClipboard(text,btn){
  function fb(){var t=document.createElement('textarea');t.value=text;t.style.position='fixed';t.style.opacity='0';document.body.appendChild(t);t.focus();t.select();try{document.execCommand('copy')}catch(e){}document.body.removeChild(t)}
  function flash(){if(!btn)return;var o=btn.textContent;btn.textContent='Copied!';btn.classList.add('copied');setTimeout(function(){btn.textContent=o;btn.classList.remove('copied')},1500)}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(flash,function(){fb();flash()})}else{fb();flash()}
}

function setUnit(u){
  triUnit=u;
  document.getElementById('tog_metric').classList.toggle('active',u==='metric');
  document.getElementById('tog_imperial').classList.toggle('active',u==='imperial');
  document.querySelectorAll('.unit-lbl').forEach(function(el){el.textContent='('+(u==='metric'?'m':'ft')+')'});
  if(triLastResult)renderResults(triLastResult);
}

function setAngleFmt(f){
  triAngleFmt=f;
  document.getElementById('tog_dms').classList.toggle('active',f==='dms');
  document.getElementById('tog_dd').classList.toggle('active',f==='dd');
  ['t_angA','t_angB','t_angC'].forEach(function(id){document.getElementById(id).placeholder=f==='dms'?'0.0000':'0.000000'});
  var dShow=f==='dms'?'':'none';
  ['dms_btn_angA','dms_btn_angB','dms_btn_angC'].forEach(function(id){document.getElementById(id).style.display=dShow});
  if(triLastResult)renderResults(triLastResult);
}

function parseTriAngle(val){
  val=val.trim();if(!val)return null;
  return SC.parseAngleDMS?SC.parseAngleDMS(val,triAngleFmt):null;
}

function fmtAngle(dd){
  var p=parseInt(document.getElementById('prec_ang').value,10);
  var d=Math.floor(dd),mt=(dd-d)*60,m=Math.floor(mt),s=(mt-m)*60;
  var f=Math.pow(10,p);s=Math.round(s*f)/f;
  if(s>=60){s=0;m++}if(m>=60){m=0;d++}
  return d+'\u00b0 '+pad2(m)+'\u2032 '+s.toFixed(p)+'\u2033';
}
function fmtAngleCopy(dd){
  var p=parseInt(document.getElementById('prec_ang').value,10);
  var d=Math.floor(dd),mt=(dd-d)*60,m=Math.floor(mt),s=(mt-m)*60;
  var f=Math.pow(10,p);s=Math.round(s*f)/f;
  if(s>=60){s=0;m++}if(m>=60){m=0;d++}
  return d+'\u00b0 '+pad2(m)+"' "+s.toFixed(p)+'"';
}
function fmtSide(v){return v.toFixed(parseInt(document.getElementById('prec_side').value,10))+' '+(triUnit==='metric'?'m':'ft')}

function clearAllErr(){
  ['sideA','sideB','sideC','angA','angB','angC'].forEach(function(f){
    document.getElementById('err_'+f).textContent='';
    document.getElementById('t_'+f).classList.remove('field-error','field-known');
  });
  document.getElementById('err_global').textContent='';
}
function setErr(f,msg){document.getElementById('err_'+f).textContent=msg;document.getElementById('t_'+f).classList.add('field-error')}
function globalErr(msg){document.getElementById('err_global').textContent=msg}

function getTriInputs(){
  var fields=['sideA','sideB','sideC','angA','angB','angC'],vals={},known=[];
  fields.forEach(function(f){
    var raw=document.getElementById('t_'+f).value.trim();
    if(!raw){vals[f]=null;return}
    var n=f.startsWith('ang')?parseTriAngle(raw):parseFloat(raw);
    if(n===null||isNaN(n)){setErr(f,'Must be a number');vals[f]=null}
    else if(n<=0&&!f.startsWith('ang')){setErr(f,'Must be positive');vals[f]=null}
    else if(f.startsWith('ang')&&(n<=0||n>=180)){setErr(f,'Must be 0-180');vals[f]=null}
    else{vals[f]=n;known.push(f);document.getElementById('t_'+f).classList.add('field-known')}
  });
  return{vals:vals,known:known};
}

function solveTriangle(){
  clearAllErr();
  document.getElementById('tri_results').style.display='none';
  document.getElementById('tri_diagram').style.display='none';
  triLastResult=null;
  var inp=getTriInputs(),v=inp.vals,k=inp.known;
  if(k.length<3){globalErr('Please enter at least 3 values');return}
  var sc=[v.sideA,v.sideB,v.sideC].filter(function(x){return x!==null}).length;
  if(sc===0){globalErr('Cannot solve with only angles - need at least one side');return}
  var method='';
  var Rf=function(d){return d*Math.PI/180};
  var Dg=function(r){return r*180/Math.PI};
  var cl=function(x){return Math.max(-1,Math.min(1,x))};
  var a=v.sideA,b=v.sideB,c=v.sideC,A=v.angA,B=v.angB,C=v.angC;
  var ac=[A,B,C].filter(function(x){return x!==null}).length;
  try{
    if(sc===3&&ac===0){
      method='SSS (Side-Side-Side)';
      A=Dg(Math.acos(cl((b*b+c*c-a*a)/(2*b*c))));
      B=Dg(Math.acos(cl((a*a+c*c-b*b)/(2*a*c))));
      C=180-A-B;
    }else if(sc===2&&ac===1){
      if(a!==null&&b!==null&&C!==null){method='SAS';c=Math.sqrt(a*a+b*b-2*a*b*Math.cos(Rf(C)));A=Dg(Math.asin(cl(a*Math.sin(Rf(C))/c)));B=180-A-C}
      else if(a!==null&&c!==null&&B!==null){method='SAS';b=Math.sqrt(a*a+c*c-2*a*c*Math.cos(Rf(B)));A=Dg(Math.asin(cl(a*Math.sin(Rf(B))/b)));C=180-A-B}
      else if(b!==null&&c!==null&&A!==null){method='SAS';a=Math.sqrt(b*b+c*c-2*b*c*Math.cos(Rf(A)));B=Dg(Math.asin(cl(b*Math.sin(Rf(A))/a)));C=180-A-B}
      else{
        method='SSA (ambiguous case) - may have two solutions';
        if(a!==null&&b!==null&&A!==null){B=Dg(Math.asin(cl(b*Math.sin(Rf(A))/a)));C=180-A-B;c=a*Math.sin(Rf(C))/Math.sin(Rf(A))}
        else if(a!==null&&c!==null&&A!==null){C=Dg(Math.asin(cl(c*Math.sin(Rf(A))/a)));B=180-A-C;b=a*Math.sin(Rf(B))/Math.sin(Rf(A))}
        else if(b!==null&&a!==null&&B!==null){A=Dg(Math.asin(cl(a*Math.sin(Rf(B))/b)));C=180-A-B;c=b*Math.sin(Rf(C))/Math.sin(Rf(B))}
        else if(b!==null&&c!==null&&B!==null){C=Dg(Math.asin(cl(c*Math.sin(Rf(B))/b)));A=180-B-C;a=b*Math.sin(Rf(A))/Math.sin(Rf(B))}
        else if(c!==null&&a!==null&&C!==null){A=Dg(Math.asin(cl(a*Math.sin(Rf(C))/c)));B=180-A-C;b=c*Math.sin(Rf(B))/Math.sin(Rf(C))}
        else if(c!==null&&b!==null&&C!==null){B=Dg(Math.asin(cl(b*Math.sin(Rf(C))/c)));A=180-B-C;a=c*Math.sin(Rf(A))/Math.sin(Rf(C))}
        else{globalErr('Could not determine solve case');return}
      }
    }else if(sc===1&&ac===2){
      if(A!==null&&B!==null)C=180-A-B;
      else if(A!==null&&C!==null)B=180-A-C;
      else if(B!==null&&C!==null)A=180-B-C;
      method='AAS/ASA (Angle-Angle-Side)';
      if(a!==null){b=a*Math.sin(Rf(B))/Math.sin(Rf(A));c=a*Math.sin(Rf(C))/Math.sin(Rf(A))}
      else if(b!==null){a=b*Math.sin(Rf(A))/Math.sin(Rf(B));c=b*Math.sin(Rf(C))/Math.sin(Rf(B))}
      else if(c!==null){a=c*Math.sin(Rf(A))/Math.sin(Rf(C));b=c*Math.sin(Rf(B))/Math.sin(Rf(C))}
    }else{globalErr('Please enter exactly 3 values (at least one side)');return}
  }catch(e){globalErr('Calculation error - check inputs');return}
  if([a,b,c,A,B,C].some(function(x){return !isFinite(x)||x<=0})){globalErr('Invalid triangle: all values must be positive');return}
  if(Math.abs(A+B+C-180)>0.01){globalErr('Invalid triangle: angles must sum to 180');return}
  if(a>=b+c||b>=a+c||c>=a+b){globalErr('Invalid triangle: triangle inequality violated');return}
  triLastResult={a:a,b:b,c:c,A:A,B:B,C:C,method:method,knownFields:k};
  renderResults(triLastResult);
  drawDiagram(triLastResult);
}

function renderResults(r){
  var sp=parseInt(document.getElementById('prec_side').value,10);
  var u=triUnit==='metric'?'m':'ft';
  var rows=[
    {label:'Side a',val:fmtSide(r.a),copy:r.a.toFixed(sp)+' '+u,known:r.knownFields.indexOf('sideA')>=0},
    {label:'Side b',val:fmtSide(r.b),copy:r.b.toFixed(sp)+' '+u,known:r.knownFields.indexOf('sideB')>=0},
    {label:'Side c',val:fmtSide(r.c),copy:r.c.toFixed(sp)+' '+u,known:r.knownFields.indexOf('sideC')>=0},
    {label:'Angle A',val:fmtAngle(r.A),copy:fmtAngleCopy(r.A),known:r.knownFields.indexOf('angA')>=0},
    {label:'Angle B',val:fmtAngle(r.B),copy:fmtAngleCopy(r.B),known:r.knownFields.indexOf('angB')>=0},
    {label:'Angle C',val:fmtAngle(r.C),copy:fmtAngleCopy(r.C),known:r.knownFields.indexOf('angC')>=0},
  ];
  window._tc=rows.map(function(r){return r.copy});
  var el=document.getElementById('res_rows');
  el.innerHTML=rows.map(function(row,i){
    var tag=row.known?'<span class="known-tag">Known</span>':'<span class="calc-tag">Calc</span>';
    return '<div class="res-row" data-i="'+i+'"><span class="res-row-label">'+row.label+tag+'</span><span class="res-row-val">'+row.val+'</span></div>';
  }).join('');
  el.onclick=function(e){var rw=e.target.closest('.res-row');if(!rw)return;copyToClipboard(window._tc[+rw.dataset.i],null)};
  document.getElementById('res_method').textContent='Solved using: '+r.method;
  document.getElementById('tri_results').style.display='block';
}

function copyAllResults(){
  if(!triLastResult)return;
  var r=triLastResult,sp=parseInt(document.getElementById('prec_side').value,10),u=triUnit==='metric'?'m':'ft';
  var lines=['Triangle Calculation','Side a: '+r.a.toFixed(sp)+' '+u,'Side b: '+r.b.toFixed(sp)+' '+u,'Side c: '+r.c.toFixed(sp)+' '+u,'Angle A: '+fmtAngleCopy(r.A),'Angle B: '+fmtAngleCopy(r.B),'Angle C: '+fmtAngleCopy(r.C)];
  copyToClipboard(lines.join('\n'),document.getElementById('copy_all_btn'));
}

function drawDiagram(r){
  var svg=document.getElementById('tri_svg');
  var W=svg.parentElement.clientWidth-32;if(W<200)W=200;
  var H=220,pad=50;
  var Rf=function(d){return d*Math.PI/180};
  var Ax=0,Ay=0,Bx=r.c,By=0,Cx=r.b*Math.cos(Rf(r.A)),Cy=r.b*Math.sin(Rf(r.A));
  var mnX=Math.min(Ax,Bx,Cx),mxX=Math.max(Ax,Bx,Cx),mnY=Math.min(Ay,By,Cy),mxY=Math.max(Ay,By,Cy);
  var sc=Math.min((W-pad*2)/(mxX-mnX||1),(H-pad*2)/(mxY-mnY||1));
  function tx(x){return pad+(x-mnX)*sc}
  function ty(y){return H-pad-(y-mnY)*sc}
  var pAx=tx(Ax),pAy=ty(Ay),pBx=tx(Bx),pBy=ty(By),pCx=tx(Cx),pCy=ty(Cy);
  svg.setAttribute('viewBox','0 0 '+W+' '+H);svg.setAttribute('width',W);svg.setAttribute('height',H);
  var cX=(pAx+pBx+pCx)/3,cY=(pAy+pBy+pCy)/3;
  function ow(mx,my,d){var dx=mx-cX,dy=my-cY,l=Math.sqrt(dx*dx+dy*dy)||1;return{x:mx+dx/l*d,y:my+dy/l*d}}
  function bs(vx,vy,ax,ay,bx,by,d){var da=Math.sqrt((ax-vx)*(ax-vx)+(ay-vy)*(ay-vy))||1,db=Math.sqrt((bx-vx)*(bx-vx)+(by-vy)*(by-vy))||1;var ux=(ax-vx)/da+(bx-vx)/db,uy=(ay-vy)/da+(by-vy)/db;var ul=Math.sqrt(ux*ux+uy*uy)||1;return{x:vx+ux/ul*d,y:vy+uy/ul*d}}
  var lA=ow(pAx,pAy,18),lB=ow(pBx,pBy,18),lC=ow(pCx,pCy,18);
  var mA=ow((pBx+pCx)/2,(pBy+pCy)/2,16),mB=ow((pAx+pCx)/2,(pAy+pCy)/2,16),mC=ow((pAx+pBx)/2,(pAy+pBy)/2,16);
  var bA=bs(pAx,pAy,pBx,pBy,pCx,pCy,26),bB=bs(pBx,pBy,pAx,pAy,pCx,pCy,26),bC=bs(pCx,pCy,pAx,pAy,pBx,pBy,26);
  svg.innerHTML=
    '<polygon points="'+pAx+','+pAy+' '+pBx+','+pBy+' '+pCx+','+pCy+'" fill="rgba(30,74,122,.2)" stroke="#2a6aaa" stroke-width="2" stroke-linejoin="round"/>'+
    '<text x="'+lA.x+'" y="'+lA.y+'" fill="#e0e0e0" font-size="15" font-weight="bold" text-anchor="middle" dominant-baseline="middle">A</text>'+
    '<text x="'+lB.x+'" y="'+lB.y+'" fill="#e0e0e0" font-size="15" font-weight="bold" text-anchor="middle" dominant-baseline="middle">B</text>'+
    '<text x="'+lC.x+'" y="'+lC.y+'" fill="#e0e0e0" font-size="15" font-weight="bold" text-anchor="middle" dominant-baseline="middle">C</text>'+
    '<text x="'+mA.x+'" y="'+mA.y+'" fill="#4fc3f7" font-size="13" font-style="italic" text-anchor="middle" dominant-baseline="middle">a</text>'+
    '<text x="'+mB.x+'" y="'+mB.y+'" fill="#4fc3f7" font-size="13" font-style="italic" text-anchor="middle" dominant-baseline="middle">b</text>'+
    '<text x="'+mC.x+'" y="'+mC.y+'" fill="#4fc3f7" font-size="13" font-style="italic" text-anchor="middle" dominant-baseline="middle">c</text>'+
    '<text x="'+bA.x+'" y="'+bA.y+'" fill="#7abcd4" font-size="12" font-style="italic" text-anchor="middle" dominant-baseline="middle">\u03b1</text>'+
    '<text x="'+bB.x+'" y="'+bB.y+'" fill="#7abcd4" font-size="12" font-style="italic" text-anchor="middle" dominant-baseline="middle">\u03b2</text>'+
    '<text x="'+bC.x+'" y="'+bC.y+'" fill="#7abcd4" font-size="12" font-style="italic" text-anchor="middle" dominant-baseline="middle">\u03b3</text>';
  document.getElementById('tri_diagram').style.display='block';
}

function resetTriangle(){
  ['t_sideA','t_sideB','t_sideC','t_angA','t_angB','t_angC'].forEach(function(id){document.getElementById(id).value='';document.getElementById(id).classList.remove('field-known','field-error')});
  clearAllErr();
  document.getElementById('tri_results').style.display='none';
  document.getElementById('tri_diagram').style.display='none';
  triLastResult=null;
}

document.getElementById('tri_reset_btn').addEventListener('click',resetTriangle);
document.getElementById('tri_calc_btn').addEventListener('click',solveTriangle);
document.getElementById('tog_metric').addEventListener('click',function(){setUnit('metric')});
document.getElementById('tog_imperial').addEventListener('click',function(){setUnit('imperial')});
document.getElementById('tog_dms').addEventListener('click',function(){setAngleFmt('dms')});
document.getElementById('tog_dd').addEventListener('click',function(){setAngleFmt('dd')});
document.getElementById('prec_side').addEventListener('change',function(){if(triLastResult)renderResults(triLastResult)});
document.getElementById('prec_ang').addEventListener('change',function(){if(triLastResult)renderResults(triLastResult)});
document.getElementById('copy_all_btn').addEventListener('click',copyAllResults);
['A','B','C'].forEach(function(k){
  document.getElementById('dms_btn_ang'+k).addEventListener('click',function(){
    SC.insertDMSSymbol(document.getElementById('t_ang'+k),this);
  });
});
</script>
