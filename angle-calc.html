<!DOCTYPE html>
<html lang="en">
<head>

<title>Angle Calculator — SurveyCalc</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
.top-bar{display:flex;align-items:center;gap:12px;background:#16213e;border-bottom:1px solid #0f3460;padding:10px 16px}
.back-btn{display:flex;align-items:center;gap:6px;color:#4fc3f7;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;padding:4px 8px;border-radius:6px;border:1px solid #1e3a5f;background:transparent;transition:all .2s}
.back-btn:hover{border-color:#4fc3f7;background:rgba(79,195,247,.08)}
.top-bar-title{font-size:15px;font-weight:600;color:#e0e0e0}
.page{padding:16px;max-width:560px;margin:0 auto}
.section-title{font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#4fc3f7;margin:0 0 10px}
.card{background:#16213e;border:1px solid #0f3460;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.input-row{display:flex;align-items:center;gap:6px}
.input-row label{font-size:13px;color:#888;width:48px;flex-shrink:0}
.dms-input{flex:1;padding:10px 12px;background:#0f1b35;border:1px solid #1e3a5f;border-radius:8px;color:#e0e0e0;font-size:17px;outline:none;font-family:'Courier New',monospace}
.dms-input:focus{border-color:#4fc3f7}
.dms-input::placeholder{color:#3a4a60}
.input-hint{font-size:11px;color:#3a5070;margin-top:5px;margin-left:54px}
.ang-tog-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ang-tog-row label{font-size:12px;color:#666}
.ang-tog{display:flex}
.ang-tog button{padding:4px 12px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #1e3a5f;background:#0f1b35;color:#888;transition:all .2s;border-radius:0;border-right-width:0}
.ang-tog button:first-child{border-radius:6px 0 0 6px}
.ang-tog button:last-child{border-radius:0 6px 6px 0;border-right-width:1px}
.ang-tog button.active{background:#4fc3f7;border-color:#4fc3f7;color:#0a0a1a}
.op-row{display:flex;gap:8px;margin:8px 0}
.op-btn{flex:1;padding:10px;border:1px solid #1e3a5f;border-radius:8px;background:#0f1b35;color:#888;font-size:20px;cursor:pointer;transition:all .2s}
.op-btn.active{background:#4fc3f7;border-color:#4fc3f7;color:#0a0a1a}
.op-btn:hover:not(.active){border-color:#4fc3f7;color:#4fc3f7}
.result-box{background:#0a0a1a;border:1px solid #1e3a5f;border-radius:8px;padding:14px;display:flex;align-items:center;gap:10px}
.result-text{flex:1;min-width:0}
.result-main{font-size:24px;font-weight:600;color:#4fc3f7;font-family:'Courier New',monospace;word-break:break-word}
.result-dd{font-size:12px;color:#555;margin-top:2px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid;transition:all .2s;white-space:nowrap;flex-shrink:0}
.btn-primary{background:#4fc3f7;border-color:#4fc3f7;color:#0a0a1a}

.res-row:hover .res-row-val{color:#4fc3f7}
.res-row-left{flex:0 0 114px;display:flex;align-items:center;gap:6px}
.res-row-label{font-size:12px;color:#888;white-space:nowrap}
.res-row-val{flex:1;font-size:14px;font-weight:600;color:#e0e0e0;font-family:'Courier New',monospace;word-break:break-all}

.btn-copy-sm{padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #1e3a5f;background:transparent;color:#888;transition:all .2s;white-space:nowrap;flex-shrink:0}

<script src="shared.js"></script>
<script>
var SC = window.SurveyCalc || {};

// ── SHARED UTILITIES ──────────────────────────────────────────────────────────
function pad2(n){ return n < 10 ? '0' + n : '' + n; }

function copyToClipboard(text, btn){
  function fb(){ var t=document.createElement('textarea'); t.value=text; t.style.position='fixed'; t.style.opacity='0'; document.body.appendChild(t); t.focus(); t.select(); try{ document.execCommand('copy'); }catch(e){} document.body.removeChild(t); }
  function flash(){ if(!btn) return; var o=btn.textContent; btn.textContent='Copied!'; btn.classList.add('copied'); setTimeout(function(){ btn.textContent=o; btn.classList.remove('copied'); }, 1500); }
  if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(flash, function(){ fb(); flash(); }); } else { fb(); flash(); }
}

// ── SHARED ANGLE HELPERS (used by calc BRG mode + converter) ─────────────────

// Full DMS string "45 45 30" or "45°45'30"" → decimal degrees
function parseDMSFull(raw){
  raw = raw.trim();
  var neg = raw.charAt(0) === '-'; if(neg) raw = raw.slice(1).trim();
  var sym = raw.match(/^(\d+(?:\.\d+)?)[°d\s]+(\d+(?:\.\d+)?)['\u2032ms\s]+(\d+(?:\.\d+)?)["s\u2033]?\s*$/i);
  if(!sym) sym = raw.match(/^(\d+(?:\.\d+)?)\s+(\d+(?:\.\d+)?)\s+(\d+(?:\.\d+)?)\s*$/);
  if(!sym) return null;
  var d = parseFloat(sym[1]), m = parseFloat(sym[2]), s = parseFloat(sym[3]);
  if(m >= 60 || s >= 60) return null;
  var dd = d + m/60 + s/3600;
  return neg ? -dd : dd;
}

// Compact DMS "45.4530" → decimal degrees
function parseCompactToDD(raw){
  raw = raw.trim();
  var neg = raw.charAt(0) === '-'; if(neg) raw = raw.slice(1);
  var dot = raw.indexOf('.');
  var d, fr;
  if(dot === -1){ d = parseInt(raw, 10); fr = '0000'; }
  else { d = parseInt(raw.slice(0, dot), 10); fr = (raw.slice(dot + 1) + '0000').slice(0, 4); }
  if(isNaN(d)) return null;
  var m = parseInt(fr.slice(0, 2), 10), s = parseInt(fr.slice(2, 4), 10);
  if(m > 59 || s > 59) return null;
  return neg ? -(d + m/60 + s/3600) : (d + m/60 + s/3600);
}

// Quadrant bearing "N45.4530E" or "N 45 45 30 E" → decimal degrees (azimuth)
function parseBearing(raw){
  raw = raw.trim().toUpperCase();
  var single = raw.match(/^([NSEW])$/);
  if(single) return { N:0, E:90, S:180, W:270 }[single[1]];
  var m = raw.match(/^([NS])\s*([\d°'"\s.dms]+?)\s*([EW])$/i);
  if(!m) return null;
  var prefix = m[1], angStr = m[2].trim(), suffix = m[3];
  var subDD = null;
  if(/\s/.test(angStr) || /[°d'ms"]/i.test(angStr)){ subDD = parseDMSFull(angStr); }
  else if(angStr.indexOf('.') !== -1){ subDD = parseCompactToDD(angStr); }
  else { subDD = parseFloat(angStr); if(isNaN(subDD)) subDD = null; }
  if(subDD === null || subDD < 0 || subDD > 90) return null;
  if(prefix==='N' && suffix==='E') return subDD;
  if(prefix==='S' && suffix==='E') return 180 - subDD;
  if(prefix==='S' && suffix==='W') return 180 + subDD;
  if(prefix==='N' && suffix==='W') return 360 - subDD;
  return null;
}

// DD → "D° MM′ SS″" string (decSec = decimal places on seconds)
function ddToDMSStr(dd, decSec){
  var neg = dd < 0, v = Math.abs(dd);
  var d = Math.floor(v), mt = (v - d)*60, m = Math.floor(mt), s = (mt - m)*60;
  var factor = Math.pow(10, decSec || 0);
  s = Math.round(s * factor) / factor;
  if(s >= 60){ s = 0; m++; } if(m >= 60){ m = 0; d++; }
  var sStr = decSec > 0 ? s.toFixed(decSec) : pad2(Math.round(s));
  if(decSec > 0){ var parts = sStr.split('.'); parts[0] = pad2(parseInt(parts[0], 10)); sStr = parts.join('.'); }
  return (neg ? '-' : '') + d + '\u00b0 ' + pad2(m) + '\u2032 ' + sStr + '\u2033';
}

// DD → "D.MMSS" compact string
function ddToCompactStr(dd){
  var neg = dd < 0, v = Math.abs(dd);
  var d = Math.floor(v), mt = (v - d)*60, m = Math.floor(mt), s = Math.round((mt - m)*60);
  if(s >= 60){ s = 0; m++; } if(m >= 60){ m = 0; d++; }
  return (neg ? '-' : '') + d + '.' + pad2(m) + pad2(s);
}

// DD → bearing string "N D° MM′ SS″ E"
function ddToBearing(dd, dp){
  if(dp === undefined) dp = 0;
  var az = ((dd % 360) + 360) % 360, EPS = 1e-8;
  if(Math.abs(az) < EPS || Math.abs(az - 360) < EPS) return 'N';
  if(Math.abs(az - 90)  < EPS) return 'E';
  if(Math.abs(az - 180) < EPS) return 'S';
  if(Math.abs(az - 270) < EPS) return 'W';
  var prefix, suffix, sub;
  if(az > 0   && az < 90)  { prefix='N'; suffix='E'; sub=az; }
  else if(az > 90  && az < 180) { prefix='S'; suffix='E'; sub=180-az; }
  else if(az > 180 && az < 270) { prefix='S'; suffix='W'; sub=az-180; }
  else                           { prefix='N'; suffix='W'; sub=360-az; }
  return prefix + ' ' + ddToDMSStr(sub, dp) + ' ' + suffix;
}

// DD → compact bearing "N45.4530E" for field input
function ddToBearingCompact(dd){
  var az = ((dd % 360) + 360) % 360, EPS = 1e-8;
  if(Math.abs(az) < EPS || Math.abs(az - 360) < EPS) return 'N';
  if(Math.abs(az - 90)  < EPS) return 'E';
  if(Math.abs(az - 180) < EPS) return 'S';
  if(Math.abs(az - 270) < EPS) return 'W';
  var prefix, suffix, sub;
  if(az > 0   && az < 90)  { prefix='N'; suffix='E'; sub=az; }
  else if(az > 90  && az < 180) { prefix='S'; suffix='E'; sub=180-az; }
  else if(az > 180 && az < 270) { prefix='S'; suffix='W'; sub=az-180; }
  else                           { prefix='N'; suffix='W'; sub=360-az; }
  return prefix + ddToCompactStr(sub) + suffix;
}


// ── ANGLE CALCULATOR ──────────────────────────────────────────────────────────
var currentOp = 'add', resultSec = null, logEntries = [], logCount = 0, angCalcFmt = 'dms';

function toExpanded(s){
  if(angCalcFmt === 'brg') return ddToBearing(s / 3600, 0);
  s = ((s % 1296000) + 1296000) % 1296000;
  var d = Math.floor(s/3600), r = s - d*3600, m = Math.floor(r/60), sec = Math.round(r - m*60);
  if(sec >= 60){ sec -= 60; m++; } if(m >= 60){ m -= 60; d++; } if(d >= 360) d -= 360;
  return d + '\u00b0 ' + pad2(m) + '\u2032 ' + pad2(sec) + '\u2033';
}

function toCondensed(s){
  if(angCalcFmt === 'brg') return ddToBearingCompact(s / 3600);
  s = ((s % 1296000) + 1296000) % 1296000;
  var d = Math.floor(s/3600), r = s - d*3600, m = Math.floor(r/60), sec = Math.round(r - m*60);
  if(sec >= 60){ sec -= 60; m++; } if(m >= 60){ m -= 60; d++; } if(d >= 360) d -= 360;
  return d + '.' + pad2(m) + pad2(sec);
}

function toDD(s){ return (s / 3600).toFixed(6) + '\u00b0 decimal'; }

function emptyDisplay(){
  return angCalcFmt === 'brg' ? '\u2014 \u2014 \u2014' : '\u2014\u00b0 \u2014\u2014\u2032 \u2014\u2014\u2033';
}

function setAngCalcFmt(fmt){
  angCalcFmt = fmt;
  document.getElementById('atog_dms').classList.toggle('active', fmt === 'dms');
  document.getElementById('atog_dd').classList.toggle('active',  fmt === 'dd');
  document.getElementById('atog_brg').classList.toggle('active', fmt === 'brg');
  var hDms = 'DMS: 45\u00b0 34\u2032 23\u2033  or  45.3423  or  45 34 23';
  var hDd  = 'Decimal degrees: e.g. 12.575000';
  var hBrg = 'Bearing: N45.4530E  or  N 45 45 30 E  or  S12.3000W';
  var h = fmt === 'dms' ? hDms : fmt === 'brg' ? hBrg : hDd;
  document.getElementById('hint_a').textContent = h;
  document.getElementById('hint_b').textContent = h;
  var ph = fmt === 'dms' ? '0.0000' : fmt === 'brg' ? 'N0.0000E' : '0.000000';
  document.getElementById('a_val').placeholder = ph;
  document.getElementById('b_val').placeholder = ph;
  var dShow = fmt === 'dms' ? '' : 'none';
  document.getElementById('dms_btn_a').style.display = dShow;
  document.getElementById('dms_btn_b').style.display = dShow;
  clearAll();
}

function parseAngleEntry(raw){
  raw = raw.trim(); if(!raw) return 0;
  if(angCalcFmt === 'brg'){
    var bd = parseBearing(raw);
    return bd === null ? null : bd * 3600;
  }
  if(angCalcFmt === 'dd'){
    var dd = parseFloat(raw.replace(/[^\d.-]/g, ''));
    return isNaN(dd) ? null : dd * 3600;
  }
  // DMS mode
  var neg = raw.startsWith('-'); var abs = neg ? raw.slice(1).trim() : raw;
  var d = 0, m = 0, s = 0;
  var reSym = /^(\d+(?:\.\d+)?)[^\d]+(\d+(?:\.\d+)?)[^\d]+(\d+(?:\.\d+)?)[^\d]*$/;
  var reSpc = /^(\d+(?:\.\d+)?)\s+(\d+(?:\.\d+)?)\s+(\d+(?:\.\d+)?)$/;
  var reCon = /^(\d+)\.(\d{1,4})$/;
  var m1 = abs.match(reSym), m2 = abs.match(reSpc), m3 = abs.match(reCon);
  if(m1){ d=parseFloat(m1[1]); m=parseFloat(m1[2]); s=parseFloat(m1[3]); }
  else if(m2){ d=parseFloat(m2[1]); m=parseFloat(m2[2]); s=parseFloat(m2[3]); }
  else if(m3){ d=parseInt(m3[1],10); var fr=(m3[2]+'0000').slice(0,4); m=parseInt(fr.slice(0,2),10); s=parseInt(fr.slice(2,4),10); }
  else { var f=parseFloat(abs); if(isNaN(f)) return null; var pts=abs.split('.'); d=parseInt(pts[0],10)||0; var fr2=((pts[1]||'')+'0000').slice(0,4); m=parseInt(fr2.slice(0,2),10)||0; s=parseInt(fr2.slice(2,4),10)||0; }
  if(m > 59 || s >= 60) return null;
  var tot = d*3600 + m*60 + s;
  return neg ? -tot : tot;
}

function parseDMS(v){ var r = parseAngleEntry(v); return r === null ? 0 : r; }
function validateEntry(v){ return !v.trim() || parseAngleEntry(v) !== null; }

function setOp(op){
  currentOp = op;
  document.getElementById('op_add').classList.toggle('active', op === 'add');
  document.getElementById('op_sub').classList.toggle('active', op === 'sub');
  calculate();
}

function setDisplay(exp, dd){
  document.getElementById('result_expanded').textContent = exp;
  document.getElementById('result_dd').textContent = dd;
}
function setEnabled(on){
  ['copyA_btn','copyB_btn','log_btn','flip_res_btn','copy_result_btn'].forEach(function(id){
    document.getElementById(id).disabled = !on;
  });
}

function calculate(){
  var aRaw = document.getElementById('a_val').value || '';
  var bRaw = document.getElementById('b_val').value || '';
  var err  = document.getElementById('error_msg');
  if(!aRaw && !bRaw){
    err.style.display = 'none'; resultSec = null;
    setDisplay(emptyDisplay(), 'Enter values above'); setEnabled(false); return;
  }
  if(!validateEntry(aRaw) || !validateEntry(bRaw)){
    err.style.display = 'block'; err.textContent = 'Invalid format \u2014 check your input.';
    resultSec = null; setDisplay(emptyDisplay(), ''); setEnabled(false); return;
  }
  var aS = parseDMS(aRaw), bS = parseDMS(bRaw);
  var res = currentOp === 'add' ? aS + bS : aS - bS;
  err.style.display = 'none';
  res = ((res % 1296000) + 1296000) % 1296000;
  resultSec = res;
  setDisplay(toExpanded(res), toDD(res));
  setEnabled(true);
}

function clearField(p){ document.getElementById(p + '_val').value = ''; calculate(); }
function flip(p){
  var c = parseDMS(document.getElementById(p + '_val').value);
  document.getElementById(p + '_val').value = toCondensed(((c + 648000) % 1296000 + 1296000) % 1296000);
  calculate();
}
function flipResult(){ if(resultSec === null) return; resultSec = ((resultSec + 648000) % 1296000 + 1296000) % 1296000; setDisplay(toExpanded(resultSec), toDD(resultSec)); }
function copyResult(btn){ if(resultSec === null) return; copyToClipboard(toExpanded(resultSec), btn); }
function copyTo(p){ if(resultSec === null) return; document.getElementById(p + '_val').value = toCondensed(resultSec); calculate(); }

function logResult(){
  if(resultSec === null) return;
  logCount++;
  var a = document.getElementById('a_val').value || '0.0000';
  var b = document.getElementById('b_val').value || '0.0000';
  logEntries.push({ num:logCount, a:a, b:b, op:currentOp==='add'?'+':'\u2212', expanded:toExpanded(resultSec), dd:toDD(resultSec) });
  renderLog();
}

function renderLog(){
  document.getElementById('copy_log_btn').disabled = !logEntries.length;
  var el = document.getElementById('traverse_log');
  if(!logEntries.length){ el.innerHTML = '<div class="log-empty">No steps logged yet</div>'; el.onclick = null; return; }
  window._lc = logEntries.map(function(e){ return e.expanded; });
  el.innerHTML = logEntries.map(function(e, i){
    return '<div class="log-entry"><div class="log-num">'+e.num+'</div><div class="log-body"><div class="log-calc">'+e.a+' <span style="color:#4fc3f7">'+e.op+'</span> '+e.b+'</div><div class="log-result">= '+e.expanded+'</div><div class="log-dd">'+e.dd+'</div></div><button class="btn-copy" data-i="'+i+'">Copy</button></div>';
  }).join('');
  el.onclick = function(e){ var b = e.target.closest('.btn-copy'); if(!b) return; copyToClipboard(window._lc[+b.dataset.i], b); };
  el.scrollTop = el.scrollHeight;
}

function clearLog(){ logEntries = []; logCount = 0; document.getElementById('copy_log_btn').disabled = true; renderLog(); keepFocus(); }

function copyLog(){
  if(!logEntries.length) return;
  var now = new Date();
  var dt = pad2(now.getDate())+'/'+pad2(now.getMonth()+1)+'/'+now.getFullYear()+' '+pad2(now.getHours())+':'+pad2(now.getMinutes())+':'+pad2(now.getSeconds());
  var lines = ['History - ' + dt];
  logEntries.forEach(function(e){ lines.push(e.a + ' ' + e.op + ' ' + e.b + ' = ' + e.expanded); });
  copyToClipboard(lines.join('\n'), document.getElementById('copy_log_btn'));
}

function clearAll(){
  document.getElementById('a_val').value = '';
  document.getElementById('b_val').value = '';
  resultSec = null;
  document.getElementById('error_msg').style.display = 'none';
  setDisplay(emptyDisplay(), 'Enter values above');
  setEnabled(false);
}

// ── FOCUS MANAGEMENT ─────────────────────────────────────────────────────────
var _lastFocus = 'a';
function focusField(which, moveEnd){
  _lastFocus = which;
  var el = document.getElementById(which + '_val');
  var wasFocused = (document.activeElement === el);
  el.focus();
  if(moveEnd || !wasFocused){ var l = el.value.length; el.setSelectionRange(l, l); }
}
function keepFocus(){ setTimeout(function(){ focusField(_lastFocus); }, 0); }

document.querySelectorAll('button').forEach(function(b){
  b.setAttribute('tabindex', '-1');
  b.addEventListener('mousedown', function(e){ e.preventDefault(); });
});
document.getElementById('a_val').setAttribute('tabindex', '1');
document.getElementById('b_val').setAttribute('tabindex', '2');
document.getElementById('cv_input').setAttribute('tabindex', '10');

document.addEventListener('keydown', function(e){
  if(e.key === 'Tab'){
    // Don't intercept Tab if focus is in the converter section
    if(document.getElementById('conv_section').contains(document.activeElement)) return;
    e.preventDefault(); e.stopPropagation();
    focusField(_lastFocus === 'a' ? 'b' : 'a');
  }
}, true);

document.getElementById('a_val').addEventListener('focus', function(){ _lastFocus = 'a'; });
document.getElementById('b_val').addEventListener('focus', function(){ _lastFocus = 'b'; });

document.querySelector('.page').addEventListener('mouseup', function(e){
  var a = document.getElementById('a_val'), b = document.getElementById('b_val');
  var cvSec = document.getElementById('conv_section');
  if(cvSec && cvSec.contains(e.target)) return; // don't steal focus from converter
  if(e.target !== a && e.target !== b) setTimeout(function(){ keepFocus(); }, 0);
});

// ── WIRE UP CALC EVENTS ───────────────────────────────────────────────────────
document.getElementById('a_val').addEventListener('input', calculate);
document.getElementById('b_val').addEventListener('input', calculate);
document.getElementById('atog_dms').addEventListener('click', function(){ setAngCalcFmt('dms'); keepFocus(); });
document.getElementById('atog_dd').addEventListener('click',  function(){ setAngCalcFmt('dd');  keepFocus(); });
document.getElementById('atog_brg').addEventListener('click', function(){ setAngCalcFmt('brg'); keepFocus(); });
document.getElementById('op_add').addEventListener('click', function(){ setOp('add'); keepFocus(); });
document.getElementById('op_sub').addEventListener('click', function(){ setOp('sub'); keepFocus(); });
document.getElementById('flipA_btn').addEventListener('click',    function(){ flip('a'); focusField('a', true); });
document.getElementById('flipB_btn').addEventListener('click',    function(){ flip('b'); focusField('b', true); });
document.getElementById('clearA_btn').addEventListener('click',   function(){ clearField('a'); focusField('a', true); });
document.getElementById('clearB_btn').addEventListener('click',   function(){ clearField('b'); focusField('b', true); });
document.getElementById('flip_res_btn').addEventListener('click', function(){ flipResult(); keepFocus(); });
document.getElementById('copy_result_btn').addEventListener('click', function(){ copyResult(this); keepFocus(); });
document.getElementById('copyA_btn').addEventListener('click',    function(){ copyTo('a'); focusField('b', true); });
document.getElementById('copyB_btn').addEventListener('click',    function(){ copyTo('b'); focusField('a', true); });
document.getElementById('log_btn').addEventListener('click',      function(){ logResult(); keepFocus(); });
document.getElementById('clear_log_btn').addEventListener('click',function(){ clearLog(); keepFocus(); });
document.getElementById('copy_log_btn').addEventListener('click', function(){ copyLog(); keepFocus(); });
document.getElementById('clear_btn').addEventListener('click',    function(){ clearAll(); focusField('a', true); });
document.getElementById('dms_btn_a').addEventListener('click', function(){ SC.insertDMSSymbol(document.getElementById('a_val'), this); });
document.getElementById('dms_btn_b').addEventListener('click', function(){ SC.insertDMSSymbol(document.getElementById('b_val'), this); });

setAngCalcFmt('dms');
setTimeout(function(){ focusField('a', true); }, 100);


// ── ANGLE CONVERTER ───────────────────────────────────────────────────────────
var cvFmt = 'dd', cvDD = null, cvDP = 0;
window._cv = [];

var CV_FORMATS = [
  { id:'dd',      btnId:'cv_fmt_dd',      label:'DD',          placeholder:'45.758333', hint:'Decimal degrees — e.g.  45.758333' },
  { id:'dms',     btnId:'cv_fmt_dms',     label:'DMS',         placeholder:'45 45 30',  hint:'Degrees minutes seconds — e.g.  45 45 30  or  45\u00b045\'30"' },
  { id:'compact', btnId:'cv_fmt_compact', label:'Compact DMS', placeholder:'45.4530',   hint:'Compact DMS (DD.MMSS) — e.g.  45.4530 = 45\u00b0 45\u2032 30\u2033' },
  { id:'rad',     btnId:'cv_fmt_rad',     label:'Radians',     placeholder:'0.798584',  hint:'Radians — e.g.  0.798584' },
  { id:'grad',    btnId:'cv_fmt_grad',    label:'Grads',       placeholder:'50.8426',   hint:'Grads / Gon (400 grad = 360\u00b0) — e.g.  50.8426' },
  { id:'bearing', btnId:'cv_fmt_bearing', label:'Bearing',     placeholder:'N45.4530E', hint:'Quadrant bearing — e.g.  N45.4530E  or  N 45 45 30 E' }
];

function cvDetectDP(raw, fmt){
  if(fmt === 'compact') return 0;
  if(fmt === 'dms'){
    var m = raw.trim().match(/(\d+(?:\.\d+)?)[s"\u2033]?\s*$/i);
    if(!m) return 0;
    var dot = m[1].indexOf('.');
    return dot === -1 ? 0 : m[1].length - dot - 1;
  }
  if(fmt === 'bearing'){
    var bm = raw.trim().toUpperCase().match(/^([NS])\s*([\d\u00b0'"\s.dms]+?)\s*([EW])$/i);
    if(!bm) return 0;
    var angStr = bm[2].trim();
    if(/\s/.test(angStr) || /[\u00b0d'ms"]/i.test(angStr)) return cvDetectDP(angStr, 'dms');
    return 0;
  }
  return -1;
}

function cvComputeDP(dd){
  var v = Math.abs(dd), d = Math.floor(v), mt = (v-d)*60, m = Math.floor(mt), s = (mt-m)*60;
  s = Math.round(s * 1e9) / 1e9;
  if(Math.abs(s - Math.round(s)) < 5e-4) return 0;
  for(var dp = 1; dp <= 6; dp++){
    var sr = Math.round(s * Math.pow(10,dp)) / Math.pow(10,dp);
    if(Math.abs(sr - s) < 5e-8) return dp;
  }
  return 6;
}

function cvGetDP(dd, raw, fmt){
  var fi = cvDetectDP(raw, fmt);
  return fi >= 0 ? fi : cvComputeDP(dd);
}

function cvParseInput(raw, fmt){
  raw = raw.trim(); if(!raw) return null;
  var n;
  switch(fmt){
    case 'dd':      n = parseFloat(raw); return isNaN(n) ? null : n;
    case 'dms':     return parseDMSFull(raw);
    case 'compact': return parseCompactToDD(raw);
    case 'rad':     n = parseFloat(raw); return isNaN(n) ? null : n * 180 / Math.PI;
    case 'grad':    n = parseFloat(raw); return isNaN(n) ? null : n * 0.9;
    case 'bearing': return parseBearing(raw);
    default:        return null;
  }
}

function cvSetFmt(id){
  cvFmt = id;
  var fmtObj = null;
  for(var i = 0; i < CV_FORMATS.length; i++){
    var f = CV_FORMATS[i];
    document.getElementById(f.btnId).classList.toggle('active', f.id === id);
    if(f.id === id) fmtObj = f;
  }
  if(fmtObj){
    document.getElementById('cv_input').placeholder = fmtObj.placeholder;
    document.getElementById('cv_hint').textContent  = fmtObj.hint;
  }
  document.getElementById('cv_dms_btn').style.display = id === 'dms' ? '' : 'none';
  cvConvert();
}

function cvConvert(){
  var raw   = document.getElementById('cv_input').value;
  var errEl = document.getElementById('cv_err');
  var warnEl= document.getElementById('cv_warn');
  var inp   = document.getElementById('cv_input');
  errEl.textContent = ''; warnEl.textContent = ''; inp.classList.remove('inp-error');
  if(!raw.trim()){ document.getElementById('cv_card_results').style.display = 'none'; cvDD = null; return; }
  var dd = cvParseInput(raw, cvFmt);
  if(dd === null){
    var msgs = {
      dd:      'Enter a number — e.g. 45.758333',
      dms:     'Format: 45 45 30  or  45\u00b045\'30"',
      compact: 'Format: 45.4530  (= 45\u00b0 45\u2032 30\u2033)',
      rad:     'Enter a number in radians — e.g. 0.798584',
      grad:    'Enter a number in grads — e.g. 50.8426',
      bearing: 'Format: N45.4530E  or  N 45 45 30 E  (sub-angle 0\u201390\u00b0)'
    };
    errEl.textContent = msgs[cvFmt] || 'Invalid input';
    inp.classList.add('inp-error');
    document.getElementById('cv_card_results').style.display = 'none';
    cvDD = null; return;
  }
  cvDD = dd;
  cvDP = cvGetDP(dd, raw.trim(), cvFmt);
  var norm = ((dd % 360) + 360) % 360;
  if(Math.abs(dd) > 360) warnEl.textContent = 'Angle outside 0\u2013360\u00b0 \u2014 bearing shown for normalized value (' + norm.toFixed(4) + '\u00b0)';
  cvRender(dd);
}

function cvRender(dd){
  var rows = [
    { id:'dd',      label:'DD',          value: dd.toFixed(6)+'\u00b0',                  copy: dd.toFixed(6)+'\u00b0' },
    { id:'dms',     label:'DMS',         value: ddToDMSStr(dd, cvDP),                    copy: ddToDMSStr(dd, cvDP) },
    { id:'compact', label:'Compact DMS', value: ddToCompactStr(dd),                      copy: ddToCompactStr(dd) },
    { id:'rad',     label:'Radians',     value: (dd*Math.PI/180).toFixed(6)+' rad',      copy: (dd*Math.PI/180).toFixed(6)+' rad' },
    { id:'grad',    label:'Grads',       value: (dd*400/360).toFixed(4)+' grad',         copy: (dd*400/360).toFixed(4)+' grad' },
    { id:'bearing', label:'Bearing',     value: ddToBearing(dd, cvDP),                   copy: ddToBearing(dd, cvDP) }
  ];
  window._cv = [];
  var html = '';
  for(var i = 0; i < rows.length; i++){
    var r = rows[i];
    window._cv.push(r.copy);
    var badge = (r.id === cvFmt) ? '<span class="input-badge">input</span>' : '';
    html += '<div class="res-row"><div class="res-row-left"><span class="res-row-label">'+r.label+'</span>'+badge+'</div><span class="res-row-val">'+r.value+'</span><button class="btn-copy-sm" data-i="'+i+'">Copy</button></div>';
  }
  document.getElementById('cv_result_rows').innerHTML = html;
  document.getElementById('cv_card_results').style.display = '';
}

document.getElementById('cv_result_rows').addEventListener('click', function(e){
  var btn = e.target.closest('.btn-copy-sm'); if(!btn) return;
  copyToClipboard(window._cv[+btn.dataset.i], btn);
});

function cvCopyAll(){
  if(cvDD === null) return;
  var dd = cvDD, fmtLabel = '';
  for(var i = 0; i < CV_FORMATS.length; i++){ if(CV_FORMATS[i].id === cvFmt){ fmtLabel = CV_FORMATS[i].label; break; } }
  var inputVal = document.getElementById('cv_input').value.trim();
  var lines = [
    'Angle Conversions',
    'Input: ' + inputVal + ' (' + fmtLabel + ')',
    '',
    'DD:           ' + dd.toFixed(6) + '\u00b0',
    'DMS:          ' + ddToDMSStr(dd, cvDP),
    'Compact DMS:  ' + ddToCompactStr(dd),
    'Radians:      ' + (dd*Math.PI/180).toFixed(6) + ' rad',
    'Grads:        ' + (dd*400/360).toFixed(4) + ' grad',
    'Bearing:      ' + ddToBearing(dd, cvDP)
  ];
  copyToClipboard(lines.join('\n'), document.getElementById('cv_copy_all_btn'));
}

function cvClear(){
  document.getElementById('cv_input').value = '';
  cvConvert();
  document.getElementById('cv_input').focus();
}

// Wire up converter events
document.getElementById('cv_input').addEventListener('input', cvConvert);
document.getElementById('cv_dms_btn').addEventListener('click', function(){
  SC.insertDMSSymbol(document.getElementById('cv_input'), this);
});
document.getElementById('cv_copy_all_btn').addEventListener('click', cvCopyAll);
document.getElementById('cv_clear_btn').addEventListener('click', cvClear);
CV_FORMATS.forEach(function(f){
  document.getElementById(f.btnId).addEventListener('click', function(){ cvSetFmt(f.id); });
});
document.getElementById('cv_input').addEventListener('focus', function(){
  if(!this.classList.contains('inp-error')) this.style.borderColor = '#4fc3f7';
});
document.getElementById('cv_input').addEventListener('blur', function(){
  if(!this.classList.contains('inp-error')) this.style.borderColor = '#1e3a5f';
});

cvSetFmt('dd');
</script>
